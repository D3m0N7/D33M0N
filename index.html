<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Sofía Miamor</title>
    <style>
        :root {
            --bg-color: #fdf0f4;
            --window-bg: #f9d9e2;
            --border-color: #d88fa5;
            --text-color: #4a4a4a;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        .window {
            background-color: var(--window-bg);
            border: 4px solid var(--border-color);
            box-shadow: 10px 10px 0px rgba(216, 143, 165, 0.4);
            width: 350px;
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .window-header {
            background-color: var(--border-color);
            margin: -20px -20px 20px -20px;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 14px;
        }

        h1 { font-size: 22px; color: var(--text-color); margin-bottom: 20px; }
        .cat-img { width: 180px; border-radius: 8px; margin: 10px 0; }

        .btn-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 50px;
        }

        .btn {
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid var(--border-color);
            background-color: white;
            box-shadow: 4px 4px 0px var(--border-color);
            transition: all 0.2s ease;
        }

        #no-btn { position: relative; z-index: 999; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="love-song">
        <source src="deportivo.mp3">
    </audio>

    <div class="window">
        <div class="window-header">
            <span>Chofi y José</span>
            <div><span>_ □ ×</span></div>
        </div>

        <div id="main-content">
            <h1>¿Sofi, quieres hacer el amor conmigo?</h1>
            <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXFpZ3A1Z3R4eGZ4eGZ4eGZ4eGZ4eGZ4eGZ4eGZ4eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbxxvDUQM/giphy.gif" class="cat-img">
            
            <div class="btn-wrapper">
                <button class="btn" id="yes-btn">SÍ</button>
                <button class="btn" id="no-btn">NO</button>
            </div>
        </div>

        <div id="success" class="hidden">
            <h1>¡SABÍA QUE SÍ! ❤️</h1>
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN3ZreG41bmh5eGZ4eGZ4eGZ4eGZ4eGZ4eGZ4eGZ4eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/KztT2c4u8mYYUiMKdJ/giphy.gif" class="cat-img">
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainContent = document.getElementById('main-content');
        const success = document.getElementById('success');
        const song = document.getElementById('love-song');

        const moveNoButton = () => {
            const margin = 20;
            const maxX = window.innerWidth - noBtn.offsetWidth - margin;
            const maxY = window.innerHeight - noBtn.offsetHeight - margin;
            const randomX = Math.max(margin, Math.floor(Math.random() * maxX));
            const randomY = Math.max(margin, Math.floor(Math.random() * maxY));
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        };

        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); });

        yesBtn.addEventListener('click', () => {
            mainContent.classList.add('hidden');
            success.classList.remove('hidden');
            noBtn.style.display = 'none';
            song.play(); // Aquí se activa la música
        });
    </script>
</body>
</html>
